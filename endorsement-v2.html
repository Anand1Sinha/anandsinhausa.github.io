<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4H Endorsement</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: white;
  color: #1a1a1a;
  padding: 40px 20px;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #1a1a1a;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 40px;
  cursor: pointer;
}
.back-link:hover {
  color: #5b9cf6;
}

.header {
  margin-bottom: 0;
}

.header-top {
  margin-bottom: 48px;
}

.header-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #666;
  font-weight: 600;
  margin-bottom: 16px;
}

.header-title {
  font-size: 64px;
  font-weight: 900;
  color: #1a2a5a;
  line-height: 1;
  margin-bottom: 12px;
}

.header-office {
  font-size: 22px;
  color: #666;
  font-weight: 400;
  padding-bottom: 20px;
  border-bottom: 4px solid #e85c2a;
  display: inline-block;
}

.header-content {
  display: flex;
  gap: 60px;
  align-items: flex-start;
  margin-bottom: 48px;
}

.header-text {
  flex: 1;
}

.intro-text {
  font-size: 18px;
  line-height: 1.7;
  color: #333;
}

.intro-text a {
  color: #1a2a5a;
  text-decoration: none;
  border-bottom: 2px solid #1a2a5a;
  font-weight: 600;
}

.intro-text a:hover {
  opacity: 0.8;
}

.header-photo {
  width: 100%;
  max-width: 280px;
  height: auto;
  aspect-ratio: 1;
  border-radius: 12px;
  object-fit: cover;
  margin: 0 auto;
  display: block;
  align-self: flex-start;
  margin-top: -8px;
  cursor: pointer;
}

.reasons-grid {
  display: grid;
  gap: 12px;
  margin-bottom: 60px;
}

.reason-item {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

.reason-icon {
  width: 80px;
  height: 80px;
  background: #e8f0ff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  flex-shrink: 0;
}

.reason-content {
  flex: 1;
  padding-top: 8px;
}

.reason-title {
  font-size: 22px;
  font-weight: 800;
  color: #1a2a5a;
  margin-bottom: 12px;
  line-height: 1.3;
}

.reason-description {
  font-size: 16px;
  line-height: 1.7;
  color: #555;
}

.donation-section {
  text-align: center;
  padding: 3rem 1.5rem 2rem;
  color: #86868b;
  font-size: 15px;
  line-height: 1.6;
}

.donation-section a {
  color: #06c;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-bottom 0.2s ease;
}

.donation-section a:hover {
  border-bottom: 1px solid #06c;
}

.footer-disclaimer {
  text-align: center;
  font-size: 13px;
  color: #666;
  line-height: 1.7;
}

.footer-disclaimer strong {
  color: #1a1a1a;
}

.loading {
  text-align: center;
  padding: 100px 20px;
  font-size: 21px;
  color: #86868b;
}

.error {
  text-align: center;
  padding: 100px 20px;
  font-size: 21px;
  color: #d60000;
}

/* Mobile Responsive */
@media (max-width: 768px) {
  body {
    padding: 24px 16px;
  }
  
  .header-title {
    font-size: 40px;
  }
  
  .header-office {
    font-size: 18px;
  }
  
  .header-content {
    flex-direction: column;
    gap: 32px;
  }
  
  .header-photo {
    width: 100%;
    max-width: 280px;
    height: 280px;
    align-self: center;
  }
  
  .intro-text {
    font-size: 16px;
  }
  
  .reason-item {
    flex-direction: column;
    gap: 16px;
  }
  
  .reason-icon {
    width: 64px;
    height: 64px;
    font-size: 28px;
    margin: 0 auto;
  }
  
  .reason-title {
    font-size: 19px;
  }
  
  .reason-description {
    font-size: 15px;
  }
}
</style>
</head>
<body>

<div class="container">
  <a href="#" onclick="window.history.back(); return false;" class="back-link">
    <span>←</span>
    <span>Back to Voter Guide</span>
  </a>

  <div id="content" class="loading">Loading endorsement...</div>
</div>

<script>
// Google Sheets Configuration
const SHEET_ID = '1ot939X173RXXuAk7Zs66OD_3sc9t8a9HcofS3Fv11Pg';

// Get candidate name from URL parameter
const urlParams = new URLSearchParams(window.location.search);
const candidateName = urlParams.get('name');

if (!candidateName) {
    document.getElementById('content').innerHTML = '<div class="error">No candidate specified. Please return to the voter guide.</div>';
} else {
    loadEndorsement(candidateName);
}

// CSV parser to handle quoted fields with commas
function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];
        
        if (char === '"') {
            if (inQuotes && nextChar === '"') {
                current += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (char === ',' && !inQuotes) {
            result.push(current);
            current = '';
        } else {
            current += char;
        }
    }
    result.push(current);
    return result;
}

async function loadEndorsement(name) {
    try {
        // Sheet GIDs and their names
        const sheets = [
            { gid: '106542971', name: 'Governor' },
            { gid: '1588428220', name: 'US Senate' },
            { gid: '574891025', name: 'US House' },
            { gid: '755731723', name: 'State Senate' },
            { gid: '2114817971', name: 'State House' }
        ];
        
        let candidateData = null;
        let sheetName = null;

        // Search through all sheets using GID
        for (const sheet of sheets) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${sheet.gid}`;
            const response = await fetch(url);
            const csvText = await response.text();
            
            // Parse CSV
            const lines = csvText.split('\n');
            
            // Skip header row, search data rows
            for (let i = 1; i < lines.length; i++) {
                const row = parseCSVLine(lines[i]);
                const rowName = row[3]; // Column D - Candidate Name
                
                if (rowName && rowName.trim() === name.trim()) {
                    // Clean up reasonsJSON - remove outer quotes if present
                    let reasonsJSON = row[22] || '';
                    if (reasonsJSON.startsWith('"') && reasonsJSON.endsWith('"')) {
                        reasonsJSON = reasonsJSON.slice(1, -1);
                    }
                    // Unescape double quotes
                    reasonsJSON = reasonsJSON.replace(/""/g, '"');
                    
                    // Handle photo URL - prepend domain if it's just a filename
                    let photoURL = row[18] || '';
                    if (photoURL && !photoURL.startsWith('http')) {
                        photoURL = 'https://anandsinhausa.com/' + photoURL;
                    }
                    
                    candidateData = {
                        state: row[0],           // Column A
                        district: row[1],        // Column B
                        raceName: row[2],        // Column C
                        name: row[3],            // Column D
                        party: row[4],           // Column E
                        status: row[5],          // Column F
                        endorsed: row[8],        // Column I
                        officialURL: row[11],    // Column L
                        endorsementPageURL: row[17], // Column R
                        photoURL: photoURL,      // Column S (with domain prepended)
                        collectDonation: row[19], // Column T
                        donationURL: row[20],    // Column U
                        introText: row[21],      // Column V
                        reasonsJSON: reasonsJSON // Column W (cleaned)
                    };
                    sheetName = sheet.name;
                    break;
                }
            }
            
            if (candidateData) break;
        }

        if (!candidateData) {
            document.getElementById('content').innerHTML = '<div class="error">Candidate not found. Please return to the voter guide.</div>';
            return;
        }

        // Parse reasons JSON
        let reasons = [];
        if (candidateData.reasonsJSON) {
            try {
                reasons = JSON.parse(candidateData.reasonsJSON);
            } catch (e) {
                console.error('Error parsing reasons JSON:', e);
                reasons = [];
            }
        }

        // Determine office title
        let officeTitle = `for ${candidateData.state} ${sheetName}`;
        if (sheetName === 'US Senate') {
            officeTitle = `for U.S. Senate (${candidateData.state})`;
        } else if (sheetName === 'US House') {
            officeTitle = `for U.S. House (${candidateData.state}-${candidateData.district})`;
        } else if (sheetName === 'Governor') {
            officeTitle = `for Governor of ${candidateData.state}`;
        } else if (sheetName === 'State Senate' || sheetName === 'State House') {
            officeTitle = `for ${candidateData.state} ${sheetName} District ${candidateData.district}`;
        }

        // Build the page
        renderEndorsementPage(candidateData, officeTitle, reasons);

    } catch (error) {
        console.error('Error loading endorsement:', error);
        document.getElementById('content').innerHTML = '<div class="error">Error loading endorsement. Please try again.</div>';
    }
}

function renderEndorsementPage(candidate, officeTitle, reasons) {
    // Build intro text with clickable name
    let introHTML = candidate.introText || '';
    if (candidate.officialURL && introHTML.includes(candidate.name)) {
        // Make candidate name in intro clickable
        const nameRegex = new RegExp(candidate.name, 'g');
        introHTML = introHTML.replace(nameRegex, `<a href="${candidate.officialURL}" target="_blank" rel="noopener">${candidate.name}</a>`);
    }

    // Build reasons grid
    let reasonsHTML = '';
    if (reasons && reasons.length > 0) {
        reasonsHTML = reasons.map(reason => `
            <div class="reason-item">
                <div class="reason-icon">${reason.icon || '✓'}</div>
                <div class="reason-content">
                    <h2 class="reason-title">${reason.title || ''}</h2>
                    <p class="reason-description">${reason.desc || ''}</p>
                </div>
            </div>
        `).join('');
    }

    // Build donation section
    let donationHTML = '';
    if (candidate.collectDonation === 'YES') {
        const donationURL = candidate.donationURL || 'https://secure.anedot.com/a4h/donate';
        donationHTML = `
            <div class="donation-section">
                Would you like to donate to ${candidate.name}'s campaign via A4H? 
                <a href="${donationURL}" target="_blank" rel="noopener">Donate</a>
            </div>
        `;
    }

    // Build photo section
    let photoHTML = '';
    if (candidate.photoURL) {
        if (candidate.officialURL) {
            photoHTML = `<a href="${candidate.officialURL}" target="_blank" rel="noopener" style="display: block;">
                <img src="${candidate.photoURL}" alt="${candidate.name}" class="header-photo">
            </a>`;
        } else {
            photoHTML = `<img src="${candidate.photoURL}" alt="${candidate.name}" class="header-photo">`;
        }
    }

    // Render full page
    const html = `
        <div class="header">
            <div class="header-top">
                <div class="header-label">WHY A4H ENDORSES</div>
                <h1 class="header-title">${candidate.name}</h1>
                <div class="header-office">${officeTitle}</div>
            </div>

            <div class="header-content">
                <div class="header-text">
                    <p class="intro-text">${introHTML}</p>
                </div>
                ${photoHTML}
            </div>
        </div>

        ${reasons.length > 0 ? `
            <div class="reasons-grid">
                ${reasonsHTML}
            </div>
        ` : ''}

        ${donationHTML}

        <div class="footer-disclaimer">
            <strong>A4H is a PAC.</strong> Paid for by Americans for Hindus Advocacy.<br>
            Not authorized by any candidate or candidate's committee.
        </div>
    `;

    document.getElementById('content').innerHTML = html;
    
    // Update page title
    document.title = `Why A4H Endorses ${candidate.name} | Americans4Hindus`;
}
</script>

</body>
</html>
