<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why A4H Endorses | Americans4Hindus</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: white;
  color: #1a1a1a;
  padding: 40px 20px;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #1a1a1a;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 40px;
  cursor: pointer;
}
.back-link:hover {
  color: #5b9cf6;
}

.header {
  margin-bottom: 0;
}

.header-top {
  margin-bottom: 48px;
}

.header-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #666;
  font-weight: 600;
  margin-bottom: 16px;
}

.header-title {
  font-size: 64px;
  font-weight: 900;
  color: #1a2a5a;
  line-height: 1;
  margin-bottom: 12px;
}

.header-office {
  font-size: 22px;
  color: #666;
  font-weight: 400;
  padding-bottom: 20px;
  border-bottom: 4px solid #e85c2a;
  display: inline-block;
}

.header-content {
  display: flex;
  gap: 60px;
  align-items: flex-start;
  margin-bottom: 48px;
}

.header-text {
  flex: 1;
}

.intro-text {
  font-size: 18px;
  line-height: 1.7;
  color: #333;
}

.header-photo {
  width: 100%;
  max-width: 280px;
  height: auto;
  aspect-ratio: 1;
  border-radius: 12px;
  object-fit: cover;
  margin: 0 auto;
  display: block;
  align-self: flex-start;
  margin-top: -8px;
}

.reasons-grid {
  display: grid;
  gap: 12px;
  margin-bottom: 60px;
}

.reason-item {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

.reason-icon {
  width: 80px;
  height: 80px;
  background: #e8f0ff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  flex-shrink: 0;
}

.reason-content {
  flex: 1;
  padding-top: 8px;
}

.reason-title {
  font-size: 22px;
  font-weight: 800;
  color: #1a2a5a;
  margin-bottom: 12px;
  line-height: 1.3;
}

.reason-description {
  font-size: 16px;
  line-height: 1.7;
  color: #555;
}

.footer-disclaimer {
  text-align: center;
  font-size: 13px;
  color: #666;
  line-height: 1.7;
}

.footer-disclaimer strong {
  color: #1a1a1a;
}

.loading {
  text-align: center;
  padding: 100px 20px;
  font-size: 21px;
  color: #86868b;
}

/* Mobile Responsive */
@media (max-width: 768px) {
  body {
    padding: 24px 16px;
  }
  
  .header-title {
    font-size: 40px;
  }
  
  .header-office {
    font-size: 18px;
  }
  
  .header-content {
    flex-direction: column;
    gap: 32px;
  }
  
  .header-photo {
    width: 100%;
    max-width: 280px;
    height: 280px;
    align-self: center;
  }
  
  .intro-text {
    font-size: 16px;
  }
  
  .reason-item {
    flex-direction: column;
    gap: 16px;
  }
  
  .reason-icon {
    width: 64px;
    height: 64px;
    font-size: 28px;
  }
  
  .reason-title {
    font-size: 19px;
  }
  
  .reason-description {
    font-size: 15px;
  }
}
</style>
</head>
<body>

<div class="container">
  <a href="#" onclick="window.history.back(); return false;" class="back-link">
    <span>←</span>
    <span>Back to Voter Guide</span>
  </a>

  <div id="main-content">
    <div class="loading">Loading endorsement...</div>
  </div>
</div>

<script>
// Get candidate name from URL
const urlParams = new URLSearchParams(window.location.search);
const candidateName = urlParams.get('name');

if (!candidateName) {
  document.getElementById('main-content').innerHTML = '<div class="loading">No candidate specified.</div>';
} else {
  loadEndorsement(candidateName);
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    const nextChar = line[i + 1];
    
    if (char === '"') {
      if (inQuotes && nextChar === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current);
  return result;
}

async function loadEndorsement(name) {
  try {
    const SHEET_ID = '1ot939X173RXXuAk7Zs66OD_3sc9t8a9HcofS3Fv11Pg';
    const sheets = [
      { gid: '106542971', name: 'Governor' },
      { gid: '1588428220', name: 'US Senate' },
      { gid: '574891025', name: 'US House' },
      { gid: '755731723', name: 'State Senate' },
      { gid: '2114817971', name: 'State House' }
    ];
    
    let candidate = null;
    let sheetName = null;

    for (const sheet of sheets) {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${sheet.gid}`;
      const response = await fetch(url);
      const csvText = await response.text();
      const lines = csvText.split('\n');
      
      for (let i = 1; i < lines.length; i++) {
        const row = parseCSVLine(lines[i]);
        if (row[3] && row[3].trim() === name.trim()) {
          // Clean reasonsJSON - Google Sheets wraps JSON in quotes and escapes internal quotes
          let reasonsJSON = row[22] || '';
          
          // Remove outer quotes if present (may be multiple layers)
          while (reasonsJSON.startsWith('"') && reasonsJSON.endsWith('"')) {
            reasonsJSON = reasonsJSON.slice(1, -1);
          }
          
          // Unescape all doubled quotes
          reasonsJSON = reasonsJSON.replace(/""/g, '"');
          
          console.log('Cleaned reasonsJSON for', row[3], ':', reasonsJSON.substring(0, 100) + '...');
          
          // Fix photo URL
          let photoURL = row[18] || '';
          if (photoURL && !photoURL.startsWith('http')) {
            photoURL = 'https://anandsinhausa.com/' + photoURL;
          }
          
          candidate = {
            name: row[3],
            state: row[0],
            district: row[1],
            officialURL: row[11],
            photoURL: photoURL,
            collectDonation: row[19],
            donationURL: row[20],
            introText: row[21],
            reasonsJSON: reasonsJSON
          };
          sheetName = sheet.name;
          break;
        }
      }
      if (candidate) break;
    }

    if (!candidate) {
      document.getElementById('main-content').innerHTML = '<div class="loading">Candidate not found.</div>';
      return;
    }

    // Parse reasons
    let reasons = [];
    console.log('=== DEBUG INFO ===');
    console.log('Raw reasonsJSON:', candidate.reasonsJSON);
    console.log('reasonsJSON length:', candidate.reasonsJSON ? candidate.reasonsJSON.length : 0);
    
    try {
      reasons = JSON.parse(candidate.reasonsJSON);
      console.log('✓ Parsed successfully!');
      console.log('Number of reasons:', reasons.length);
      console.log('First reason:', reasons[0]);
    } catch (e) {
      console.error('✗ JSON parse error:', e.message);
      console.error('Failed at position:', e.message.match(/position (\d+)/)?.[1]);
      console.error('Character at that position:', candidate.reasonsJSON[parseInt(e.message.match(/position (\d+)/)?.[1] || 0)]);
    }

    // Build office title
    let officeTitle = 'for U.S. Senate (' + candidate.state + ')';
    if (sheetName === 'Governor') {
      officeTitle = 'for Governor of ' + candidate.state;
    } else if (sheetName === 'US House') {
      officeTitle = 'for U.S. House (' + candidate.state + '-' + candidate.district + ')';
    }

    // Build intro with link
    let intro = candidate.introText;
    if (candidate.officialURL) {
      const linkStyle = 'color: #1a2a5a; text-decoration: none; border-bottom: 2px solid #1a2a5a; font-weight: 600;';
      intro = intro.replace(candidate.name, `<a href="${candidate.officialURL}" target="_blank" rel="noopener" style="${linkStyle}">${candidate.name}</a>`);
    }

    // Build reasons HTML
    let reasonsHTML = '';
    for (const r of reasons) {
      reasonsHTML += `
        <div class="reason-item">
          <div class="reason-icon">${r.icon}</div>
          <div class="reason-content">
            <h2 class="reason-title">${r.title}</h2>
            <p class="reason-description">${r.desc}</p>
          </div>
        </div>`;
    }

    // Build donation HTML
    let donationHTML = '';
    if (candidate.collectDonation === 'YES') {
      const donateURL = candidate.donationURL || 'https://secure.anedot.com/a4h/donate';
      donationHTML = `
        <div style="text-align: center; padding: 3rem 1.5rem 2rem; color: #86868b; font-size: 15px; line-height: 1.6;">
          Would you like to donate to ${candidate.name}'s campaign via A4H? 
          <a href="${donateURL}" target="_blank" rel="noopener" style="color: #06c; text-decoration: none; border-bottom: 1px solid transparent; transition: border-bottom 0.2s ease;">Donate</a>
        </div>`;
    }

    // Render page
    document.getElementById('main-content').innerHTML = `
      <div class="header">
        <div class="header-top">
          <div class="header-label">WHY A4H ENDORSES</div>
          <h1 class="header-title">${candidate.name}</h1>
          <div class="header-office">${officeTitle}</div>
        </div>

        <div class="header-content">
          <div class="header-text">
            <p class="intro-text">${intro}</p>
          </div>
          <a href="${candidate.officialURL}" target="_blank" rel="noopener" style="display: block;">
            <img src="${candidate.photoURL}" alt="${candidate.name}" class="header-photo" style="cursor: pointer;">
          </a>
        </div>
      </div>

      <div class="reasons-grid">
        ${reasonsHTML}
      </div>

      ${donationHTML}

      <div class="footer-disclaimer">
        <strong>A4H is a PAC.</strong> Paid for by Americans for Hindus Advocacy.<br>
        Not authorized by any candidate or candidate's committee.
      </div>`;

    document.title = `Why A4H Endorses ${candidate.name} | Americans4Hindus`;

  } catch (error) {
    console.error('Error:', error);
    document.getElementById('main-content').innerHTML = '<div class="loading">Error loading page.</div>';
  }
}
</script>

</body>
</html>
