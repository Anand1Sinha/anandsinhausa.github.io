<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A4H Voter Guide 2026 - Premium</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }

.candidate-card {
  background:#fff;
  border-radius:10px;
  padding:16px;
  margin-bottom:12px;
  position:relative;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.candidate-card.endorsed {
  border-left:6px solid gold;
  background:linear-gradient(180deg,#fffdf5,#fff7e6);
}

/* GOLD RIBBON */
.ribbon {
  position:absolute;
  top:12px;
  right:-6px;
  background:linear-gradient(45deg,#d4af37,#f6e27a);
  color:#5a3e00;
  padding:6px 14px;
  font-weight:800;
  font-size:12px;
  transform:rotate(6deg);
  border-radius:4px;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
}

.candidate-name { font-size:18px; font-weight:800; }
.candidate-link { font-size:13px; color:#2563eb; text-decoration:none; display:block; margin-top:4px;}
.candidate-link:hover { text-decoration:underline; }

.meta { margin-top:8px; font-size:13px; }

</style>
</head>
<body>

<div class="candidate-card endorsed">
  <div class="ribbon">★ A4H ENDORSED</div>
  <div class="candidate-name">Anil Kumar</div>
  <a class="candidate-link" href="#">View Website →</a>
  <div class="meta">Independent | Open Seat | MI | MI-11</div>
</div>

<div class="candidate-card">
  <div class="candidate-name">Other Candidate</div>
  <a class="candidate-link" href="#">View Website →</a>
  <div class="meta">Democrat | Challenger | MI | MI-11</div>
</div>

</body>
</html>
