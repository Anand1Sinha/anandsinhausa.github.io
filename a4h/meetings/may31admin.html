<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A4H May 31 Admin Console</title>
<style>
:root{
  --navy:#172640;--navy2:#223553;--cream:#f8f0df;
  --saffron:#f36c21;--gold:#d6a437;--muted:#5d6675;
  --green:#2a9d4e;--line:rgba(23,38,64,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--cream);color:#15233b;line-height:1.5}

/* Header */
.admin-header{background:var(--navy);color:white;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.admin-title{font-size:20px;font-weight:700}
.admin-subtitle{font-size:12px;opacity:.65;margin-top:2px}
.refresh-controls{display:flex;gap:12px;align-items:center}
.refresh-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.refresh-btn:hover{background:rgba(255,255,255,.25)}
.live-badge{display:flex;align-items:center;gap:6px;font-size:12px;opacity:.75}
.live-dot{width:8px;height:8px;border-radius:50%;background:#2a9d4e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* Tabs */
.tabs{display:flex;background:white;border-bottom:2px solid var(--line);position:sticky;top:57px;z-index:99}
.tab{flex:1;padding:14px 20px;text-align:center;font-weight:600;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.05em}
.tab:hover{background:rgba(243,108,33,.05);color:var(--navy)}
.tab.active{color:var(--saffron);border-bottom-color:var(--saffron);background:rgba(243,108,33,.06)}
.tab-count{display:inline-block;background:var(--saffron);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;margin-left:6px}
.tab.active .tab-count{background:var(--navy)}

/* Content */
.tab-content{display:none;padding:24px;max-width:1200px;margin:0 auto}
.tab-content.active{display:block}

/* Stats */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:white;border:1px solid var(--line);border-radius:8px;padding:16px;text-align:center}
.stat-value{font-size:34px;font-weight:700;color:var(--navy);margin-bottom:4px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}

/* Question cards */
.question-card{background:white;border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.04);transition:box-shadow .2s}
.question-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08)}
.question-card.answered-card{opacity:.65}

.q-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.q-number{font-size:13px;font-weight:700;color:var(--saffron);font-family:Arial,sans-serif;letter-spacing:.04em}
.q-time{font-size:12px;color:var(--muted)}
.q-name{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px}
.q-text{font-size:17px;line-height:1.5;color:#15233b;margin-bottom:12px;font-family:Georgia,serif}
.q-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge{display:inline-block;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge-speaker{background:rgba(243,108,33,.1);color:var(--saffron)}
.badge-topic{background:rgba(23,38,64,.08);color:var(--navy)}
.badge-answered{background:#d1ecf1;color:#0c5460}

.q-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:9px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.04em}
.btn-answered{background:var(--green);color:white}
.btn-answered:hover{background:#238a41}
.btn-unanswered{background:#e9ecef;color:var(--navy)}
.btn-unanswered:hover{background:#dee2e6}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:16px;opacity:.25}
.empty-text{font-size:18px;font-weight:600;margin-bottom:6px}
.empty-sub{font-size:14px;opacity:.7}

/* Check-in */
.checkin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.checkin-search{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:8px;font-size:16px;margin-bottom:18px;outline:none;transition:border-color .2s}
.checkin-search:focus{border-color:var(--saffron)}
.checkin-row{background:white;border:1px solid var(--line);border-radius:8px;padding:14px 18px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;transition:opacity .3s,transform .3s}
.checkin-row:hover{box-shadow:0 2px 8px rgba(0,0,0,.07)}
.checkin-name{font-size:16px;font-weight:600;color:var(--navy)}
.checkin-meta{font-size:12px;color:var(--muted);margin-top:2px}
.btn-checkin{background:var(--green);color:white;border:none;padding:9px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;transition:background .2s;white-space:nowrap}
.btn-checkin:hover{background:#238a41}
.checkin-done-row{background:white;border:1px solid rgba(42,157,78,.2);border-radius:8px;padding:12px 18px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;opacity:.7}
.checkin-done-name{font-size:15px;font-weight:600;color:var(--navy)}
.checkin-done-time{font-size:12px;color:var(--green);font-weight:600}
.checkin-badge{display:inline-block;background:rgba(42,157,78,.12);color:var(--green);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:8px}
.checkin-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:20px 0 10px}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.88);display:none;align-items:center;justify-content:center;z-index:1000}
.loading-overlay.active{display:flex}
.spinner{width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--saffron);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .admin-header{flex-direction:column;align-items:flex-start;gap:10px}
  .tabs{top:81px}
  .stats-bar{grid-template-columns:1fr 1fr}
  .q-actions .btn{flex:1;text-align:center}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<header class="admin-header">
  <div>
    <div class="admin-title">A4H May 31 · Admin Console</div>
    <div class="admin-subtitle">Question Tracker — auto-refresh every 15s</div>
  </div>
  <div class="refresh-controls">
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    <button class="refresh-btn" onclick="manualRefresh(this)">↻ Refresh Now</button>
  </div>
</header>

<nav class="tabs">
  <div class="tab active" onclick="switchTab('unanswered')">
    Unanswered <span class="tab-count" id="countUnanswered">0</span>
  </div>
  <div class="tab" onclick="switchTab('answered')">
    Answered <span class="tab-count" id="countAnswered">0</span>
  </div>
  <div class="tab" onclick="switchTab('checkin')">
    Check-In <span class="tab-count" id="countCheckin">0</span>
  </div>
</nav>

<div class="tab-content active" id="tabUnanswered">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="statUnanswered">0</div><div class="stat-label">Unanswered</div></div>
    <div class="stat-card"><div class="stat-value" id="statAnswered">0</div><div class="stat-label">Answered</div></div>
    <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div>
  </div>
  <div id="listUnanswered"></div>
</div>

<div class="tab-content" id="tabAnswered">
  <div id="listAnswered"></div>
</div>

<div class="tab-content" id="tabCheckin">
  <div class="checkin-stats">
    <div class="stat-card"><div class="stat-value" id="statCheckedIn">0</div><div class="stat-label">Checked In</div></div>
    <div class="stat-card"><div class="stat-value" id="statPendingCheckin">0</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-value" id="statTotalRegistered">0</div><div class="stat-label">Registered</div></div>
  </div>
  <input class="checkin-search" id="checkinSearch" type="text" placeholder="Type to filter by name…" oninput="renderCheckin()" list="guestNameList" autocomplete="off" />
  <datalist id="guestNameList"></datalist>
  <div class="checkin-section-title">Pending Check-In</div>
  <div id="listPending"></div>
  <div class="checkin-section-title">Checked In</div>
  <div id="listCheckedIn"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEsXyih8GNe_prPO8s3RpLf6y93P2X2QVZAJpkFivuVQDX5ECceEXZkV9hOUtb9rQa4g/exec";
const REFRESH_INTERVAL = 15000;

let allQuestions = [];
let refreshTimer = null;

function escapeHtml(t){
  const d = document.createElement("div");
  d.innerText = t || "";
  return d.innerHTML;
}

function formatTime(ts){
  if(!ts) return "";
  const d = new Date(ts);
  return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

function loadQuestions(){
  const cb = "adminLoad_" + Date.now();

  window[cb] = function(data){
    allQuestions = Array.isArray(data) ? data : [];
    renderAll();
    delete window[cb];
  };

  const s = document.createElement("script");
  s.src = SCRIPT_URL + "?action=admin&callback=" + cb;
  s.onerror = () => { allQuestions = []; renderAll(); };
  document.body.appendChild(s);
}

function renderAll(){
  const unanswered = allQuestions.filter(q => !q.status || q.status.toLowerCase() !== 'answered');
  const answered   = allQuestions.filter(q => q.status && q.status.toLowerCase() === 'answered');

  // Update counts
  document.getElementById('countUnanswered').textContent = unanswered.length;
  document.getElementById('countAnswered').textContent   = answered.length;
  document.getElementById('statUnanswered').textContent  = unanswered.length;
  document.getElementById('statAnswered').textContent    = answered.length;
  document.getElementById('statTotal').textContent       = allQuestions.length;

  renderList('listUnanswered', unanswered, false);
  renderList('listAnswered',   answered,   true);
}

function renderList(containerId, questions, isAnswered){
  const el = document.getElementById(containerId);

  if(!questions.length){
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${isAnswered ? '✓' : '💬'}</div>
        <div class="empty-text">${isAnswered ? 'No answered questions yet' : 'No questions yet'}</div>
        <div class="empty-sub">${isAnswered ? 'Mark questions as answered during the meeting' : 'Questions will appear here as attendees submit them'}</div>
      </div>`;
    return;
  }

  el.innerHTML = questions.map(q => {
    const cardClass = isAnswered ? ' answered-card' : '';
    const actionBtn = isAnswered
      ? `<button class="btn btn-unanswered" onclick="setStatus('${q.id}','Pending')">↩ Mark Unanswered</button>`
      : `<button class="btn btn-answered"   onclick="setStatus('${q.id}','Answered')">✓ Mark Answered</button>`;

    return `
    <div class="question-card${cardClass}">
      <div class="q-top">
        <div class="q-number">${escapeHtml(q.displayNumber)}</div>
        <div class="q-time">${formatTime(q.timestamp)}</div>
      </div>
      <div class="q-name">${escapeHtml(q.name || 'Unknown')}</div>
      <div class="q-text">${escapeHtml(q.question)}</div>
      ${q.speaker || q.topic ? `
      <div class="q-meta">
        ${q.speaker ? `<span class="badge badge-speaker">${escapeHtml(q.speaker)}</span>` : ''}
        ${q.topic   ? `<span class="badge badge-topic">${escapeHtml(q.topic)}</span>`     : ''}
        ${isAnswered ? `<span class="badge badge-answered">Answered</span>`               : ''}
      </div>` : ''}
      <div class="q-actions">${actionBtn}</div>
    </div>`;
  }).join('');
}

function switchTab(name){
  const names = ['unanswered','answered','checkin'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if(name === 'checkin') loadGuests();
}

// ── Check-In ──────────────────────────────────────────────
let allGuests = [];

function loadGuests(){
  const cb = "guestLoad_" + Date.now();
  window[cb] = function(data){
    allGuests = Array.isArray(data) ? data : [];
    const dl = document.getElementById('guestNameList');
    dl.innerHTML = allGuests.map(g => `<option value="${escapeHtml(g.fullName)}">`).join('');
    renderCheckin();
    delete window[cb];
  };
  const s = document.createElement("script");
  s.src = SCRIPT_URL + "?action=getGuests&callback=" + cb;
  s.onerror = () => { allGuests = []; renderCheckin(); };
  document.body.appendChild(s);
}

function renderCheckin(){
  const query = (document.getElementById('checkinSearch').value || '').toLowerCase();
  const pending   = allGuests.filter(g => g.checkedIn !== 'Yes' && (!query || g.fullName.toLowerCase().includes(query)));
  const checkedIn = allGuests.filter(g => g.checkedIn === 'Yes'  && (!query || g.fullName.toLowerCase().includes(query)));

  document.getElementById('statCheckedIn').textContent      = allGuests.filter(g => g.checkedIn === 'Yes').length;
  document.getElementById('statPendingCheckin').textContent = allGuests.filter(g => g.checkedIn !== 'Yes').length;
  document.getElementById('statTotalRegistered').textContent = allGuests.length;
  document.getElementById('countCheckin').textContent       = allGuests.filter(g => g.checkedIn !== 'Yes').length;

  const pendingEl = document.getElementById('listPending');
  if(!pending.length){
    pendingEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">${query ? 'No match found' : 'Everyone is checked in!'}</div></div>`;
  } else {
    pendingEl.innerHTML = pending.map(g => `
      <div class="checkin-row" id="grow-${g.id}">
        <div>
          <div class="checkin-name">${escapeHtml(g.fullName)}</div>
          ${g.phone ? `<div class="checkin-meta">${escapeHtml(g.phone)}</div>` : ''}
        </div>
        <button class="btn-checkin" onclick="checkIn('${g.id}')">✓ Check In</button>
      </div>`).join('');
  }

  const doneEl = document.getElementById('listCheckedIn');
  if(!checkedIn.length){
    doneEl.innerHTML = `<div style="color:var(--muted);font-size:14px;padding:8px 0">No one checked in yet</div>`;
  } else {
    doneEl.innerHTML = checkedIn.map(g => `
      <div class="checkin-done-row">
        <div class="checkin-done-name">${escapeHtml(g.fullName)}<span class="checkin-badge">✓ In</span></div>
        <div class="checkin-done-time">${escapeHtml(g.checkedInTime || '')}</div>
      </div>`).join('');
  }
}

function checkIn(guestId){
  const g = allGuests.find(g => g.id === guestId);
  if(!g) return;

  g.checkedIn = 'Yes';
  g.checkedInTime = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});

  const row = document.getElementById('grow-' + guestId);
  if(row){
    row.style.transition = 'opacity .3s, transform .3s';
    row.style.opacity = '0';
    row.style.transform = 'translateX(40px)';
    setTimeout(() => renderCheckin(), 320);
  } else {
    renderCheckin();
  }

  const cb = "checkin_" + Date.now();
  window[cb] = function(){ delete window[cb]; };
  const s = document.createElement("script");
  s.src = SCRIPT_URL + "?action=checkIn&guestId=" + encodeURIComponent(guestId) + "&callback=" + cb;
  s.onerror = () => { delete window[cb]; };
  document.body.appendChild(s);
}

function setStatus(questionId, status){
  // Optimistically update local data immediately
  const q = allQuestions.find(q => q.id === questionId);
  if(!q) return;
  q.status = status;

  // Find the card and animate it out smoothly
  const cards = document.querySelectorAll('.question-card');
  let targetCard = null;
  cards.forEach(card => {
    const btn = card.querySelector('.btn');
    if(btn && btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(questionId)){
      targetCard = card;
    }
  });

  if(targetCard){
    const btn = targetCard.querySelector('.btn');
    if(btn){ btn.disabled = true; btn.style.opacity = '0.5'; }
    targetCard.style.transition = 'opacity .35s, transform .35s, max-height .4s';
    targetCard.style.opacity = '0';
    targetCard.style.transform = 'translateX(40px)';
    setTimeout(() => { renderAll(); }, 380);
  } else {
    renderAll();
  }

  // Send update via JSONP — avoids CORS issues
  const cb = "statusUpdate_" + Date.now();
  window[cb] = function(result){ delete window[cb]; };
  const s = document.createElement("script");
  s.src = SCRIPT_URL
    + "?action=updateStatus"
    + "&questionId=" + encodeURIComponent(questionId)
    + "&status="     + encodeURIComponent(status)
    + "&callback="   + cb;
  s.onerror = function(){ delete window[cb]; };
  document.body.appendChild(s);
}

function manualRefresh(btn){
  btn.textContent = '↻ Refreshing...';
  btn.disabled = true;
  loadQuestions();
  setTimeout(() => { btn.textContent = '↻ Refresh Now'; btn.disabled = false; }, 1000);
}

function startAutoRefresh(){
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadQuestions, REFRESH_INTERVAL);
}

loadQuestions();
startAutoRefresh();

window.addEventListener('beforeunload', () => { if(refreshTimer) clearInterval(refreshTimer); });
</script>
</body>
</html>
