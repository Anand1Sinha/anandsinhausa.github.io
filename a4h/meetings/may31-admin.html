<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A4H May 31 Admin Console</title>
<style>
:root{
  --navy:#172640;--navy2:#223553;--cream:#f8f0df;
  --saffron:#f36c21;--gold:#d6a437;--muted:#5d6675;
  --green:#2a9d4e;--line:rgba(23,38,64,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--cream);color:#15233b;line-height:1.5}

/* Header */
.admin-header{background:var(--navy);color:white;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.admin-title{font-size:20px;font-weight:700}
.admin-subtitle{font-size:12px;opacity:.65;margin-top:2px}
.refresh-controls{display:flex;gap:12px;align-items:center}
.refresh-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.refresh-btn:hover{background:rgba(255,255,255,.25)}
.live-badge{display:flex;align-items:center;gap:6px;font-size:12px;opacity:.75}
.live-dot{width:8px;height:8px;border-radius:50%;background:#2a9d4e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* Tabs */
.tabs{display:flex;background:white;border-bottom:2px solid var(--line);position:sticky;top:57px;z-index:99}
.tab{flex:1;padding:14px 20px;text-align:center;font-weight:600;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.05em}
.tab:hover{background:rgba(243,108,33,.05);color:var(--navy)}
.tab.active{color:var(--saffron);border-bottom-color:var(--saffron);background:rgba(243,108,33,.06)}
.tab-count{display:inline-block;background:var(--saffron);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;margin-left:6px}
.tab.active .tab-count{background:var(--navy)}

/* Content */
.tab-content{display:none;padding:24px;max-width:1200px;margin:0 auto}
.tab-content.active{display:block}

/* Stats */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:white;border:1px solid var(--line);border-radius:8px;padding:16px;text-align:center}
.stat-value{font-size:34px;font-weight:700;color:var(--navy);margin-bottom:4px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}

/* Question cards */
.question-card{background:white;border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.04);transition:box-shadow .2s}
.question-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08)}
.question-card.answered-card{opacity:.65}

.q-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.q-number{font-size:13px;font-weight:700;color:var(--saffron);font-family:Arial,sans-serif;letter-spacing:.04em}
.q-time{font-size:12px;color:var(--muted)}
.q-name{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px}
.q-text{font-size:17px;line-height:1.5;color:#15233b;margin-bottom:12px;font-family:Georgia,serif}
.q-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge{display:inline-block;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge-speaker{background:rgba(243,108,33,.1);color:var(--saffron)}
.badge-topic{background:rgba(23,38,64,.08);color:var(--navy)}
.badge-answered{background:#d1ecf1;color:#0c5460}

.q-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:9px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.04em}
.btn-answered{background:var(--green);color:white}
.btn-answered:hover{background:#238a41}
.btn-unanswered{background:#e9ecef;color:var(--navy)}
.btn-unanswered:hover{background:#dee2e6}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:16px;opacity:.25}
.empty-text{font-size:18px;font-weight:600;margin-bottom:6px}
.empty-sub{font-size:14px;opacity:.7}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.88);display:none;align-items:center;justify-content:center;z-index:1000}
.loading-overlay.active{display:flex}
.spinner{width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--saffron);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .admin-header{flex-direction:column;align-items:flex-start;gap:10px}
  .tabs{top:81px}
  .stats-bar{grid-template-columns:1fr 1fr}
  .q-actions .btn{flex:1;text-align:center}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<header class="admin-header">
  <div>
    <div class="admin-title">A4H May 31 · Admin Console</div>
    <div class="admin-subtitle">Question Tracker — auto-refresh every 15s</div>
  </div>
  <div class="refresh-controls">
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    <button class="refresh-btn" onclick="manualRefresh(this)">↻ Refresh Now</button>
  </div>
</header>

<nav class="tabs">
  <div class="tab active" onclick="switchTab('unanswered')">
    Unanswered <span class="tab-count" id="countUnanswered">0</span>
  </div>
  <div class="tab" onclick="switchTab('answered')">
    Answered <span class="tab-count" id="countAnswered">0</span>
  </div>
</nav>

<div class="tab-content active" id="tabUnanswered">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="statUnanswered">0</div><div class="stat-label">Unanswered</div></div>
    <div class="stat-card"><div class="stat-value" id="statAnswered">0</div><div class="stat-label">Answered</div></div>
    <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div>
  </div>
  <div id="listUnanswered"></div>
</div>

<div class="tab-content" id="tabAnswered">
  <div id="listAnswered"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEsXyih8GNe_prPO8s3RpLf6y93P2X2QVZAJpkFivuVQDX5ECceEXZkV9hOUtb9rQa4g/exec";
const REFRESH_INTERVAL = 15000;

let allQuestions = [];
let refreshTimer = null;

function escapeHtml(t){
  const d = document.createElement("div");
  d.innerText = t || "";
  return d.innerHTML;
}

function formatTime(ts){
  if(!ts) return "";
  const d = new Date(ts);
  return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

function loadQuestions(){
  const cb = "adminLoad_" + Date.now();

  window[cb] = function(data){
    allQuestions = Array.isArray(data) ? data : [];
    renderAll();
    delete window[cb];
  };

  const s = document.createElement("script");
  s.src = SCRIPT_URL + "?action=admin&callback=" + cb;
  s.onerror = () => { allQuestions = []; renderAll(); };
  document.body.appendChild(s);
}

function renderAll(){
  const unanswered = allQuestions.filter(q => !q.status || q.status.toLowerCase() !== 'answered');
  const answered   = allQuestions.filter(q => q.status && q.status.toLowerCase() === 'answered');

  // Update counts
  document.getElementById('countUnanswered').textContent = unanswered.length;
  document.getElementById('countAnswered').textContent   = answered.length;
  document.getElementById('statUnanswered').textContent  = unanswered.length;
  document.getElementById('statAnswered').textContent    = answered.length;
  document.getElementById('statTotal').textContent       = allQuestions.length;

  renderList('listUnanswered', unanswered, false);
  renderList('listAnswered',   answered,   true);
}

function renderList(containerId, questions, isAnswered){
  const el = document.getElementById(containerId);

  if(!questions.length){
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${isAnswered ? '✓' : '💬'}</div>
        <div class="empty-text">${isAnswered ? 'No answered questions yet' : 'No questions yet'}</div>
        <div class="empty-sub">${isAnswered ? 'Mark questions as answered during the meeting' : 'Questions will appear here as attendees submit them'}</div>
      </div>`;
    return;
  }

  el.innerHTML = questions.map(q => {
    const cardClass = isAnswered ? ' answered-card' : '';
    const actionBtn = isAnswered
      ? `<button class="btn btn-unanswered" onclick="setStatus('${q.id}','Pending')">↩ Mark Unanswered</button>`
      : `<button class="btn btn-answered"   onclick="setStatus('${q.id}','Answered')">✓ Mark Answered</button>`;

    return `
    <div class="question-card${cardClass}">
      <div class="q-top">
        <div class="q-number">${escapeHtml(q.displayNumber)}</div>
        <div class="q-time">${formatTime(q.timestamp)}</div>
      </div>
      <div class="q-name">${escapeHtml(q.name || 'Unknown')}</div>
      <div class="q-text">${escapeHtml(q.question)}</div>
      ${q.speaker || q.topic ? `
      <div class="q-meta">
        ${q.speaker ? `<span class="badge badge-speaker">${escapeHtml(q.speaker)}</span>` : ''}
        ${q.topic   ? `<span class="badge badge-topic">${escapeHtml(q.topic)}</span>`     : ''}
        ${isAnswered ? `<span class="badge badge-answered">Answered</span>`               : ''}
      </div>` : ''}
      <div class="q-actions">${actionBtn}</div>
    </div>`;
  }).join('');
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['unanswered','answered'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

async function setStatus(questionId, status){
  document.getElementById('loadingOverlay').classList.add('active');

  try{
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateStatus', questionId, status })
    });
    setTimeout(() => {
      loadQuestions();
      document.getElementById('loadingOverlay').classList.remove('active');
    }, 500);
  } catch(err){
    alert('Failed to update question status. Please try again.');
    document.getElementById('loadingOverlay').classList.remove('active');
  }
}

function manualRefresh(btn){
  btn.textContent = '↻ Refreshing...';
  btn.disabled = true;
  loadQuestions();
  setTimeout(() => { btn.textContent = '↻ Refresh Now'; btn.disabled = false; }, 1000);
}

function startAutoRefresh(){
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadQuestions, REFRESH_INTERVAL);
}

loadQuestions();
startAutoRefresh();

window.addEventListener('beforeunload', () => { if(refreshTimer) clearInterval(refreshTimer); });
</script>
</body>
</html>
