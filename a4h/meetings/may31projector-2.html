<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A4H May 31 · Projector Display</title>
<style>
:root{
  --navy:#172640;--saffron:#f36c21;--gold:#d6a437;--cream:#f8f0df;
  --green:#2a9d4e;--line:rgba(255,255,255,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:Georgia,"Times New Roman",serif;
  background:var(--navy);
  color:white;
  display:flex;
  flex-direction:column;
}

/* ── Header ── */
.proj-header{
  background:var(--saffron);
  padding:16px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
}
.proj-title{font-family:Arial,sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.proj-subtitle{font-family:Arial,sans-serif;font-size:13px;opacity:.88;margin-top:2px}
.proj-controls{display:flex;align-items:center;gap:14px}
.ctrl-btn{
  background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.35);
  color:white;padding:7px 16px;border-radius:6px;
  font-family:Arial,sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:background .2s;letter-spacing:.03em;
}
.ctrl-btn:hover{background:rgba(0,0,0,.32)}
.ctrl-btn.active-mode{background:rgba(0,0,0,.38);border-color:white}
.live-dot{width:10px;height:10px;border-radius:50%;background:#fff;opacity:.9;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:.9}50%{opacity:.3}}

/* ── Tabs ── */
.proj-tabs{
  display:flex;
  background:rgba(0,0,0,.25);
  border-bottom:2px solid var(--line);
  flex-shrink:0;
}
.proj-tab{
  flex:1;padding:13px 20px;text-align:center;
  font-family:Arial,sans-serif;font-size:14px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.55);cursor:pointer;
  border-bottom:3px solid transparent;transition:all .2s;
}
.proj-tab:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.proj-tab.active{color:white;border-bottom-color:var(--saffron);background:rgba(243,108,33,.12)}
.proj-tab-count{
  display:inline-block;background:var(--saffron);color:white;
  font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;margin-left:6px;
}
.proj-tab.active .proj-tab-count{background:rgba(255,255,255,.25)}

/* ── Question list (scrollable sidebar style) ── */
.tab-content{display:none;flex:1;overflow-y:auto;padding:0}
.tab-content.active{display:block}

/* ── When a question is DISPLAYED FULLSCREEN ── */
body.fullscreen-mode .proj-tabs,
body.fullscreen-mode .tab-content{display:none}
body.fullscreen-mode .fullscreen-view{display:flex}

/* ── Question list items ── */
.q-list-item{
  display:flex;align-items:flex-start;gap:16px;
  padding:20px 32px;border-bottom:1px solid var(--line);
  cursor:pointer;transition:background .18s;
}
.q-list-item:hover{background:rgba(255,255,255,.06)}
.q-list-item.selected{background:rgba(243,108,33,.18);border-left:4px solid var(--saffron)}
.q-list-item.answered-item{opacity:.5}

.q-num{
  flex-shrink:0;width:52px;height:52px;border-radius:50%;
  background:var(--saffron);display:flex;align-items:center;justify-content:center;
  font-family:Arial,sans-serif;font-size:17px;font-weight:800;
}
.q-list-item.answered-item .q-num{background:rgba(255,255,255,.2)}

.q-body{flex:1;min-width:0}
.q-list-name{font-family:Arial,sans-serif;font-size:13px;font-weight:700;color:#ffd45f;margin-bottom:5px}
.q-list-text{font-size:17px;line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,.9)}
.q-list-meta{margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.q-badge{
  display:inline-block;padding:3px 9px;border-radius:4px;
  font-family:Arial,sans-serif;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  background:rgba(243,108,33,.2);color:#ffb06b;
}
.q-badge.answered-badge{background:rgba(255,255,255,.12);color:rgba(255,255,255,.5)}

.q-display-btn{
  flex-shrink:0;background:var(--saffron);color:white;border:none;
  padding:9px 16px;border-radius:6px;font-family:Arial,sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;
  letter-spacing:.05em;transition:background .2s;align-self:center;
}
.q-display-btn:hover{background:#d45a18}

/* ── Fullscreen question view ── */
.fullscreen-view{
  display:none;flex:1;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 80px;text-align:center;
  animation:fadeUp .4s ease;
  position:relative;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.fs-number{
  display:inline-block;background:var(--saffron);color:white;
  font-family:Arial,sans-serif;font-size:28px;font-weight:800;
  padding:10px 26px;border-radius:50px;margin-bottom:36px;
}
.fs-question{
  font-size:clamp(36px,4.5vw,64px);line-height:1.32;
  margin-bottom:36px;font-weight:400;
  max-width:1200px;
}
.fs-author{
  font-size:clamp(24px,2.8vw,38px);color:#ffd45f;
  font-style:italic;margin-bottom:24px;
}
.fs-author::before{content:"— "}
.fs-meta{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.fs-badge{
  display:inline-block;background:rgba(243,108,33,.2);color:#ffb06b;
  padding:8px 22px;border-radius:50px;
  font-family:Arial,sans-serif;font-size:16px;font-weight:600;
  text-transform:uppercase;letter-spacing:.07em;border:2px solid rgba(243,108,33,.35);
}
.fs-back{
  position:absolute;top:20px;left:28px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:white;padding:8px 16px;border-radius:6px;
  font-family:Arial,sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:background .2s;
}
.fs-back:hover{background:rgba(255,255,255,.22)}
.fs-nav{
  position:absolute;bottom:28px;right:32px;
  display:flex;gap:10px;
}
.fs-nav-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:white;padding:10px 20px;border-radius:6px;
  font-family:Arial,sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:background .2s;
}
.fs-nav-btn:hover{background:rgba(255,255,255,.22)}
.fs-nav-btn:disabled{opacity:.25;cursor:default}

/* ── Empty state ── */
.empty-state{
  text-align:center;padding:80px 40px;color:rgba(255,255,255,.35);
}
.empty-icon{font-size:56px;margin-bottom:20px;display:block}
.empty-text{font-size:20px;font-weight:600;margin-bottom:8px;color:rgba(255,255,255,.5)}
.empty-sub{font-size:14px}

/* ── Footer ── */
.proj-footer{
  background:rgba(0,0,0,.3);padding:10px 32px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:Arial,sans-serif;font-size:12px;
  color:rgba(255,255,255,.45);flex-shrink:0;
}
.kbd-hint span{
  display:inline-block;background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);border-radius:4px;
  padding:1px 6px;font-size:11px;margin:0 2px;
}

/* Light mode */
body.light-mode{background:var(--cream);color:var(--navy)}
body.light-mode .proj-tabs{background:rgba(23,38,64,.08);border-color:rgba(23,38,64,.15)}
body.light-mode .proj-tab{color:rgba(23,38,64,.45)}
body.light-mode .proj-tab.active{color:var(--navy)}
body.light-mode .q-list-item{border-color:rgba(23,38,64,.12)}
body.light-mode .q-list-item:hover{background:rgba(23,38,64,.04)}
body.light-mode .q-list-item.selected{background:rgba(243,108,33,.1)}
body.light-mode .q-list-text{color:var(--navy)}
body.light-mode .fs-question{color:var(--navy)}
body.light-mode .fs-author{color:var(--saffron)}
body.light-mode .proj-footer{background:rgba(23,38,64,.06);color:rgba(23,38,64,.45)}
body.light-mode .fullscreen-view{background:var(--cream)}
body.light-mode .fs-back,body.light-mode .fs-nav-btn,body.light-mode .ctrl-btn{color:var(--navy)}
</style>
</head>
<body>

<!-- Header -->
<header class="proj-header">
  <div>
    <div class="proj-title">A4H Michigan Planning Meeting</div>
    <div class="proj-subtitle">May 31, 2026 · Flavors, Farmington Hills</div>
  </div>
  <div class="proj-controls">
    <div class="live-dot"></div>
    <button class="ctrl-btn" onclick="toggleMode(this)">☀ Light Mode</button>
    <button class="ctrl-btn" onclick="toggleFullscreenBrowser()">⛶ Fullscreen</button>
  </div>
</header>

<!-- Tabs -->
<nav class="proj-tabs">
  <div class="proj-tab active" onclick="switchTab('unanswered')">
    Unanswered <span class="proj-tab-count" id="countUnanswered">0</span>
  </div>
  <div class="proj-tab" onclick="switchTab('answered')">
    Answered <span class="proj-tab-count" id="countAnswered">0</span>
  </div>
</nav>

<!-- Unanswered list -->
<div class="tab-content active" id="tabUnanswered">
  <div id="listUnanswered"></div>
</div>

<!-- Answered list -->
<div class="tab-content" id="tabAnswered">
  <div id="listAnswered"></div>
</div>

<!-- Fullscreen question display -->
<div class="fullscreen-view" id="fullscreenView">
  <button class="fs-back" onclick="exitFullscreenView()">← Back to List</button>
  <div class="fs-number"  id="fsNumber"></div>
  <div class="fs-question" id="fsQuestion"></div>
  <div class="fs-author"  id="fsAuthor"></div>
  <div class="fs-meta"    id="fsMeta"></div>
  <div class="fs-nav">
    <button class="fs-nav-btn" id="btnPrev" onclick="navigateFS(-1)">← Prev</button>
    <button class="fs-nav-btn" id="btnNext" onclick="navigateFS(+1)">Next →</button>
  </div>
</div>

<!-- Footer -->
<footer class="proj-footer">
  <div class="live-dot" style="background:#2a9d4e;animation:pulse 2s infinite"></div>
  <div class="kbd-hint">
    <span>←</span><span>→</span> navigate &nbsp;|&nbsp;
    <span>Esc</span> back to list &nbsp;|&nbsp;
    <span>M</span> light/dark &nbsp;|&nbsp;
    <span>F</span> fullscreen
  </div>
  <div id="footerCount">—</div>
</footer>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEsXyih8GNe_prPO8s3RpLf6y93P2X2QVZAJpkFivuVQDX5ECceEXZkV9hOUtb9rQa4g/exec";
const REFRESH_INTERVAL = 10000;

let allQuestions   = [];
let currentTab     = 'unanswered';
let fsQuestions    = []; // questions in current fullscreen context
let fsIndex        = 0;
let refreshTimer   = null;
let selectedId     = null;

function escapeHtml(t){
  const d = document.createElement("div");
  d.innerText = t || "";
  return d.innerHTML;
}

/* ── Data loading ── */
function loadQuestions(){
  const cb = "projLoad_" + Date.now();

  window[cb] = function(data){
    allQuestions = Array.isArray(data) ? data : [];
    renderAll();
    // If in fullscreen, refresh the current question in place
    if(document.body.classList.contains('fullscreen-mode') && selectedId){
      const q = allQuestions.find(q => q.id === selectedId);
      if(q) showFullscreen(q, fsQuestions, fsIndex);
    }
    delete window[cb];
  };

  const s = document.createElement("script");
  s.src = SCRIPT_URL + "?callback=" + cb;
  document.body.appendChild(s);
}

/* ── Render lists ── */
function renderAll(){
  const unanswered = allQuestions.filter(q => !q.status || q.status.toLowerCase() !== 'answered');
  const answered   = allQuestions.filter(q => q.status && q.status.toLowerCase() === 'answered');

  document.getElementById('countUnanswered').textContent = unanswered.length;
  document.getElementById('countAnswered').textContent   = answered.length;
  document.getElementById('footerCount').textContent     = `${allQuestions.length} total questions`;

  renderList('listUnanswered', unanswered, false);
  renderList('listAnswered',   answered,   true);
}

function renderList(containerId, questions, isAnswered){
  const el = document.getElementById(containerId);

  if(!questions.length){
    el.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">${isAnswered ? '✓' : '💬'}</span>
        <div class="empty-text">${isAnswered ? 'No answered questions yet' : 'No questions submitted yet'}</div>
        <div class="empty-sub">${isAnswered ? 'Questions marked answered will appear here' : 'Questions will appear as attendees submit them'}</div>
      </div>`;
    return;
  }

  el.innerHTML = questions.map((q, i) => {
    const isSelected  = q.id === selectedId;
    const cardClass   = [
      'q-list-item',
      isAnswered ? 'answered-item' : '',
      isSelected ? 'selected' : ''
    ].filter(Boolean).join(' ');

    const metaHtml = [
      q.speaker ? `<span class="q-badge${isAnswered ? ' answered-badge' : ''}"><span style="opacity:.65;font-weight:400">Addressed to:</span> ${escapeHtml(q.speaker)}</span>` : '',
      q.topic   ? `<span class="q-badge${isAnswered ? ' answered-badge' : ''}"><span style="opacity:.65;font-weight:400">Topic:</span> ${escapeHtml(q.topic)}</span>`   : ''
    ].join('');

    return `
    <div class="${cardClass}" onclick="onItemClick(${i}, '${isAnswered ? 'answered' : 'unanswered'}')">
      <div class="q-num">${escapeHtml(q.displayNumber)}</div>
      <div class="q-body">
        <div class="q-list-name">${escapeHtml(q.name)}</div>
        <div class="q-list-text">${escapeHtml(q.question)}</div>
        ${metaHtml ? `<div class="q-list-meta">${metaHtml}</div>` : ''}
      </div>
      <button class="q-display-btn" onclick="event.stopPropagation();displayQuestion(${i},'${isAnswered ? 'answered' : 'unanswered'}')">
        Display
      </button>
    </div>`;
  }).join('');
}

/* ── Item click — select & display ── */
function onItemClick(index, tab){
  const questions = tab === 'answered'
    ? allQuestions.filter(q => q.status && q.status.toLowerCase() === 'answered')
    : allQuestions.filter(q => !q.status || q.status.toLowerCase() !== 'answered');

  displayQuestion(index, tab);
}

function displayQuestion(index, tab){
  const questions = tab === 'answered'
    ? allQuestions.filter(q => q.status && q.status.toLowerCase() === 'answered')
    : allQuestions.filter(q => !q.status || q.status.toLowerCase() !== 'answered');

  if(!questions[index]) return;

  fsQuestions = questions;
  fsIndex     = index;
  selectedId  = questions[index].id;

  showFullscreen(questions[index], questions, index);
  renderAll(); // re-render to highlight selected
}

/* ── Fullscreen display ── */
function showFullscreen(q, questions, index){
  document.getElementById('fsNumber').textContent   = q.displayNumber || '';
  document.getElementById('fsQuestion').textContent = q.question      || '';
  document.getElementById('fsAuthor').textContent   = q.name          || 'Community Member';

  const metaParts = [
    q.speaker ? `<span class="fs-badge"><span style="opacity:.6;font-weight:400;font-size:.7em">Addressed to:</span> ${escapeHtml(q.speaker)}</span>` : '',
    q.topic   ? `<span class="fs-badge"><span style="opacity:.6;font-weight:400;font-size:.7em">Topic:</span> ${escapeHtml(q.topic)}</span>`   : ''
  ].join('');
  document.getElementById('fsMeta').innerHTML = metaParts;

  document.getElementById('btnPrev').disabled = (index <= 0);
  document.getElementById('btnNext').disabled = (index >= questions.length - 1);

  document.body.classList.add('fullscreen-mode');
}

function exitFullscreenView(){
  document.body.classList.remove('fullscreen-mode');
}

function navigateFS(dir){
  const newIndex = fsIndex + dir;
  if(newIndex < 0 || newIndex >= fsQuestions.length) return;
  fsIndex    = newIndex;
  selectedId = fsQuestions[fsIndex].id;
  showFullscreen(fsQuestions[fsIndex], fsQuestions, fsIndex);
}

/* ── Tab switching ── */
function switchTab(name){
  currentTab = name;
  document.querySelectorAll('.proj-tab').forEach((t, i) => {
    const names = ['unanswered','answered'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

/* ── UI helpers ── */
function toggleMode(btn){
  document.body.classList.toggle('light-mode');
  btn.textContent = document.body.classList.contains('light-mode') ? '🌙 Dark Mode' : '☀ Light Mode';
}

function toggleFullscreenBrowser(){
  if(document.fullscreenElement){
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen();
  }
}

/* ── Keyboard controls ── */
document.addEventListener('keydown', function(e){
  const inFS = document.body.classList.contains('fullscreen-mode');

  switch(e.key){
    case 'ArrowRight':
    case 'PageDown':
      if(inFS){ e.preventDefault(); navigateFS(+1); }
      break;
    case 'ArrowLeft':
    case 'PageUp':
      if(inFS){ e.preventDefault(); navigateFS(-1); }
      break;
    case 'Escape':
      if(inFS) exitFullscreenView();
      break;
    case 'm': case 'M':
      toggleMode(document.querySelector('.ctrl-btn'));
      break;
    case 'f': case 'F':
      toggleFullscreenBrowser();
      break;
  }
});

/* ── Auto-refresh ── */
function startAutoRefresh(){
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadQuestions, REFRESH_INTERVAL);
}

loadQuestions();
startAutoRefresh();

window.addEventListener('beforeunload', () => { if(refreshTimer) clearInterval(refreshTimer); });
</script>
</body>
</html>
